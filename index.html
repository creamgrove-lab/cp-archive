<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>廣播劇 × 追漫 同好頁</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/npm/jf-openhuninn@1.1.0/jf-openhuninn.css');

    :root {
      --bg: #fdfaf6;
      --card: #fffdfb;
      --text: #20162f;
      --muted: #9c8cb8;
      --line: #eadcf4;
      --purple: #8d62ba;
      --pink: #d27ab0;
      --soft: #f8eef7;
      --soft2: #f3edf9;
    }

    html, body, #root, * {
      font-family: 'jf-openhuninn', 'Noto Sans TC', sans-serif !important;
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(225, 211, 245, .38), transparent 310px),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 18px 64px;
    }

    .hero-icon {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f3ecfb, #eee4f8);
      border: 1px solid #dfd0ef;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      color: #b29acb;
      box-shadow: 0 10px 26px rgba(112, 77, 143, .08);
      overflow: hidden;
      position: relative;
    }

    .hero-icon img,
    .cover-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thread-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border: 1px solid #dfd0ef;
      border-radius: 999px;
      background: #f5effb;
      color: var(--purple);
      font-size: 14px;
      transition: .2s;
    }

    .thread-btn:hover {
      transform: translateY(-1px);
      background: #efe4fa;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin: 32px 0 30px;
      border: 1px solid #cbbdd7;
      border-radius: 9px;
      overflow: hidden;
      background: #fff;
    }

    .tab-btn {
      height: 62px;
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      background: transparent;
      border: 0;
    }

    .tab-btn.active {
      outline: 2px solid #111;
      outline-offset: -2px;
      border-radius: 8px;
      background: #fffdfa;
    }

    .section-title {
      color: var(--muted);
      font-size: 13px;
      margin: 22px 0 12px;
      padding-left: 2px;
    }

    .cp-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .cp-card {
      background: linear-gradient(180deg, var(--soft), #fff9fe);
      border: 1px solid #ebcde8;
      border-top: 4px solid transparent;
      border-image: linear-gradient(90deg, var(--purple), var(--pink)) 1;
      border-radius: 14px;
      padding: 18px 20px;
      min-height: 118px;
      position: relative;
    }

    .cp-card.wide {
      grid-column: 1 / -1;
    }

    .eyebrow {
      color: #b79cc8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cp-name {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      background: #f4e9fb;
      border: 1px solid #e6d5f4;
      color: #7955aa;
      font-size: 11px;
      line-height: 1.4;
    }

    .desc {
      color: #7c6e93;
      font-size: 13px;
      line-height: 1.7;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 26px 0 18px;
    }

    .quote-card {
      position: relative;
      background: var(--card);
      border: 1px solid #e5d6f0;
      border-radius: 14px;
      padding: 26px 30px;
      min-height: 96px;
      box-shadow: 0 8px 20px rgba(103, 65, 128, .04);
    }

    .quote-mark {
      position: absolute;
      top: 14px;
      left: 22px;
      color: #f0dff3;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .quote-text {
      padding-left: 26px;
      padding-right: 110px;
      font-size: 15px;
      line-height: 1.8;
    }

    .quote-from {
      position: absolute;
      right: 22px;
      bottom: 18px;
      color: #b18cc7;
      font-size: 13px;
    }

    .rec-list {
      display: grid;
      gap: 10px;
    }

    .rec-card {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 16px;
      background: var(--card);
      border: 1px solid #e5d6f0;
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
    }

    .rank {
      color: #efd8ee;
      font-size: 25px;
      font-weight: 900;
      line-height: 1.1;
    }

    .rec-title {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .edit-input,
    .edit-textarea {
      width: 100%;
      border: 1px solid #e2cfee;
      background: rgba(255,255,255,.72);
      border-radius: 9px;
      padding: 6px 8px;
      outline: none;
      color: var(--text);
    }

    .edit-textarea {
      min-height: 72px;
      resize: vertical;
    }

    .mini-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #dfd0ef;
      background: #fff;
      color: #7d5ba7;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      transition: .18s;
    }

    .mini-btn:hover {
      background: #f7effc;
    }

    .danger-btn {
      color: #bc5e89;
      border-color: #efcade;
    }

    .floating {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }

    .float-btn {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid #dfd0ef;
      box-shadow: 0 8px 24px rgba(78, 47, 100, .12);
      background: white;
      color: #7654a2;
      font-weight: 800;
      transition: .18s;
    }

    .float-btn:hover {
      transform: translateY(-2px);
      background: #f7effc;
    }

    .save-btn {
      background: #8d62ba;
      color: #fff;
      border-color: #8d62ba;
    }

    .upload-cover {
      position: absolute;
      inset: 0;
      background: rgba(41, 23, 64, .45);
      color: #fff;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: .2s;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }

    .hero-icon:hover .upload-cover,
    .cover-img:hover .upload-cover {
      opacity: 1;
    }

    .cover-img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid #eadcf4;
      background: #f8eef7;
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
      color: #b9a4cc;
      flex: 0 0 auto;
    }

    .loading {
      min-height: 70vh;
      display: grid;
      place-items: center;
      color: #9c8cb8;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      .page {
        padding: 22px 14px 48px;
      }

      .cp-grid {
        grid-template-columns: 1fr;
      }

      .quote-text {
        padding-right: 0;
      }

      .quote-from {
        position: static;
        text-align: right;
        margin-top: 16px;
      }

      .tabs {
        margin-top: 26px;
      }

      .floating {
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    // 這裡沿用你原本 txt 的 Supabase 設定。這是 anon key，不是 service role key。
    const SUPABASE_URL = 'https://gvzqhwnjuxmnoayytytz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2enFod25qdXhtbm9heXl0eXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTEwMDIsImV4cCI6MjA5NTQyNzAwMn0.tRk2EcOJTMcXYZvjLe3pit4qHBCsP4S9RJj8aflmi_Y';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 為了不要覆蓋你原本自介網站資料，這一頁先存 id = 2
    const SETTINGS_ID = 2;

    const defaultData = {
      hero: {
        icon: "",
        title: "廣播劇 × 追漫 同好頁",
        subtitle: "如果你也掉進同一個坑\\n歡迎來找我說話 ♡",
        threadText: "◎ Threads で找我",
        threadUrl: "https://www.threads.net/"
      },
      tabs: {
        radio: {
          label: "廣播劇",
          icon: "♫",
          cp: [
            { id: 1, work: "天官賜福", name: "花城 × 謝憐", tags: ["BL"], desc: "一個愛了八百年，一個用盡一生去回應" },
            { id: 2, work: "魔道祖師", name: "藍湛 × 魏嬰", tags: ["BL"], desc: "一個冷若冰霜，一個偏偏要把他融化" },
            { id: 3, work: "待填入", name: "你的下一個 CP ♡", tags: [], desc: "" }
          ],
          quotes: [
            { id: 1, text: "為你戰死，是我至高無上的榮耀。", from: "花城｜天官賜福" },
            { id: 2, text: "天天就是天天。", from: "魏嬰｜魔道祖師" }
          ],
          recs: [
            { id: 1, title: "天官賜福", tags: ["BL", "仙俠", "虐戀"], desc: "廣播劇還原度極高，花城聲線讓人融化。入坑必聽，沒有之一。", image: "" },
            { id: 2, title: "魔道祖師", tags: ["BL", "玄幻", "歡喜冤家"], desc: "邊做事邊聽最適合，魏嬰鬧完藍湛的片段每次都能笑出來。", image: "" }
          ]
        },
        comic: {
          label: "韓漫 / 小說",
          icon: "▣",
          cp: [
            { id: 1, work: "我的青梅竹馬", name: "男主 × 女主", tags: ["BG"], desc: "青梅竹馬設定，甜度爆表" },
            { id: 2, work: "Painter of the Night", name: "尹成昊 × 裴奈匀", tags: ["BL"], desc: "畫風絕美，劇情讓人又愛又痛" },
            { id: 3, work: "待填入", name: "你的下一個 CP ♡", tags: [], desc: "" }
          ],
          quotes: [
            { id: 1, text: "（你的第一句台詞）", from: "角色｜作品名" }
          ],
          recs: [
            { id: 1, title: "Painter of the Night", tags: ["BL", "古風", "畫風絕美"], desc: "韓漫 BL 必坑，畫風細膩到每格都想截圖。劇情虐但停不下來。", image: "" },
            { id: 2, title: "惡役千金的生存手冊", tags: ["BG", "逆襲", "爽文"], desc: "女主超帥，劇情節奏快，看了第一話就停不下來的那種。", image: "" },
            { id: 3, title: "獨家！我的老公是惡役", tags: ["BG", "穿書", "甜虐"], desc: "穿書設定加惡役男主，甜度和虐度都到位，很適合當入坑韓漫的第一部。", image: "" }
          ]
        }
      }
    };

    function IconClock() {
      return (
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
          <path d="M5 7h9M5 12h7M5 17h5" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/>
          <circle cx="17" cy="16" r="3.2" stroke="currentColor" strokeWidth="1.5"/>
          <path d="M17 14.5v1.7l1.2.8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      );
    }

    function Field({ value, editing, onChange, multiline=false, className="", placeholder="" }) {
      if (!editing) return <span className={className}>{value || placeholder}</span>;
      if (multiline) {
        return <textarea className={`edit-textarea ${className}`} value={value || ""} placeholder={placeholder} onChange={e => onChange(e.target.value)} />;
      }
      return <input className={`edit-input ${className}`} value={value || ""} placeholder={placeholder} onChange={e => onChange(e.target.value)} />;
    }

    function splitTags(value) {
      return value.split(/[、,，]/).map(t => t.trim()).filter(Boolean);
    }

    function Tags({ tags, editing, onChange }) {
      if (!editing) {
        return (
          <div className="tag-row">
            {(tags || []).map((tag, idx) => <span className="pill" key={idx}>{tag}</span>)}
          </div>
        );
      }

      return (
        <input
          className="edit-input text-[12px] my-2"
          value={(tags || []).join("、")}
          placeholder="標籤，用頓號分隔：BL、古風、甜虐"
          onChange={e => onChange(splitTags(e.target.value))}
        />
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState("radio");
      const [editing, setEditing] = useState(false);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        async function loadData() {
          try {
            const { data: row, error } = await supabaseClient
              .from("website_settings")
              .select("data")
              .eq("id", SETTINGS_ID)
              .single();

            if (!error && row?.data && Object.keys(row.data).length > 0) {
              setData(row.data);
              return;
            }
          } catch (err) {
            console.warn("Supabase 載入失敗，改用預設資料。", err);
          }

          const local = localStorage.getItem("fanpage_data");
          setData(local ? JSON.parse(local) : defaultData);
        }

        loadData();
      }, []);

      function updateHero(key, value) {
        setData(prev => ({ ...prev, hero: { ...prev.hero, [key]: value } }));
      }

      function updateTab(tabKey, section, value) {
        setData(prev => ({
          ...prev,
          tabs: {
            ...prev.tabs,
            [tabKey]: {
              ...prev.tabs[tabKey],
              [section]: value
            }
          }
        }));
      }

      async function handleUpload(e, callback) {
        const file = e.target.files?.[0];
        if (!file) return;

        try {
          const fileExt = file.name.split(".").pop();
          const safeName = `${Date.now()}_${Math.random().toString(16).slice(2)}.${fileExt}`;
          const { error } = await supabaseClient.storage.from("assets").upload(safeName, file, {
            cacheControl: "3600",
            upsert: false
          });

          if (error) throw error;

          const { data: publicData } = supabaseClient.storage.from("assets").getPublicUrl(safeName);
          callback(publicData.publicUrl);
        } catch (err) {
          alert("雲端圖片上傳失敗，會先改用本機預覽儲存。\\n錯誤：" + err.message);

          const reader = new FileReader();
          reader.onloadend = () => callback(reader.result);
          reader.readAsDataURL(file);
        }
      }

      async function saveData() {
        setSaving(true);
        localStorage.setItem("fanpage_data", JSON.stringify(data));

        try {
          const { error } = await supabaseClient
            .from("website_settings")
            .upsert({ id: SETTINGS_ID, data });

          if (error) throw error;

          alert("已儲存到雲端！");
          setEditing(false);
        } catch (err) {
          alert("雲端儲存失敗，但已暫存在這台瀏覽器。\\n錯誤：" + err.message);
        } finally {
          setSaving(false);
        }
      }

      function addItem(section) {
        const tab = data.tabs[activeTab];
        const newItem = section === "cp"
          ? { id: Date.now(), work: "新作品", name: "角色 A × 角色 B", tags: ["BL"], desc: "寫一點你想說的描述" }
          : section === "quotes"
          ? { id: Date.now(), text: "新的台詞", from: "角色｜作品名" }
          : { id: Date.now(), title: "新推坑作品", tags: ["BL"], desc: "寫下推薦理由", image: "" };

        updateTab(activeTab, section, [...tab[section], newItem]);
      }

      function removeItem(section, id) {
        const tab = data.tabs[activeTab];
        updateTab(activeTab, section, tab[section].filter(item => item.id !== id));
      }

      function updateItem(section, id, key, value) {
        const tab = data.tabs[activeTab];
        updateTab(
          activeTab,
          section,
          tab[section].map(item => item.id === id ? { ...item, [key]: value } : item)
        );
      }

      if (!data) return <div className="loading">載入同好頁中...</div>;

      const tab = data.tabs[activeTab];

      return (
        <main className="page">
          <header className="text-center pt-2">
            <div className="hero-icon" aria-hidden="true">
              {data.hero.icon ? <img src={data.hero.icon} alt="hero icon" /> : <IconClock />}
              {editing && (
                <label className="upload-cover">
                  <input type="file" accept="image/*" className="hidden" onChange={e => handleUpload(e, url => updateHero("icon", url))} />
                  上傳 icon
                </label>
              )}
            </div>

            <h1 className="text-[22px] font-black tracking-wide">
              <Field value={data.hero.title} editing={editing} onChange={v => updateHero("title", v)} />
            </h1>

            <div className="mt-4 text-[14px] leading-7 text-[#8d7da7] whitespace-pre-line">
              <Field value={data.hero.subtitle} editing={editing} multiline onChange={v => updateHero("subtitle", v)} />
            </div>

            {editing && (
              <div className="max-w-md mx-auto mt-4 grid gap-2">
                <Field value={data.hero.threadText} editing={editing} onChange={v => updateHero("threadText", v)} placeholder="Threads 按鈕文字" />
                <Field value={data.hero.threadUrl} editing={editing} onChange={v => updateHero("threadUrl", v)} placeholder="Threads 連結" />
              </div>
            )}

            {!editing && (
              <a className="thread-btn mt-5" href={data.hero.threadUrl} target="_blank" rel="noopener">
                {data.hero.threadText}
              </a>
            )}
          </header>

          <nav className="tabs" aria-label="內容分類">
            {Object.entries(data.tabs).map(([key, item]) => (
              <button key={key} className={`tab-btn ${activeTab === key ? "active" : ""}`} onClick={() => setActiveTab(key)}>
                <span>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </nav>

          {editing && (
            <div className="grid grid-cols-2 gap-2 mb-6">
              <div>
                <p className="text-xs text-[#9c8cb8] mb-1">目前頁籤 icon</p>
                <Field value={tab.icon} editing={editing} onChange={v => updateTab(activeTab, "icon", v)} />
              </div>
              <div>
                <p className="text-xs text-[#9c8cb8] mb-1">目前頁籤名稱</p>
                <Field value={tab.label} editing={editing} onChange={v => updateTab(activeTab, "label", v)} />
              </div>
            </div>
          )}

          <p className="section-title">CP 牆</p>

          <section className="cp-grid">
            {tab.cp.map((item, index) => (
              <article className={`cp-card ${index === 2 ? "wide" : ""}`} key={item.id}>
                {editing && (
                  <button className="mini-btn danger-btn absolute right-3 top-3" onClick={() => removeItem("cp", item.id)}>
                    刪除
                  </button>
                )}

                <p className="eyebrow">
                  <Field value={item.work} editing={editing} onChange={v => updateItem("cp", item.id, "work", v)} placeholder="作品名" />
                </p>
                <h2 className="cp-name">
                  <Field value={item.name} editing={editing} onChange={v => updateItem("cp", item.id, "name", v)} placeholder="角色 A × 角色 B" />
                </h2>
                <Tags tags={item.tags} editing={editing} onChange={v => updateItem("cp", item.id, "tags", v)} />
                <p className="desc">
                  <Field value={item.desc} editing={editing} multiline onChange={v => updateItem("cp", item.id, "desc", v)} placeholder="描述" />
                </p>
              </article>
            ))}

            {editing && (
              <button className="cp-card wide text-[#8d62ba] font-bold border-dashed" onClick={() => addItem("cp")}>
                ＋ 新增 CP
              </button>
            )}
          </section>

          <div className="divider"></div>

          <p className="section-title">台詞收藏</p>

          <section className="space-y-3">
            {tab.quotes.map(item => (
              <article className="quote-card" key={item.id}>
                {editing && (
                  <button className="mini-btn danger-btn absolute right-3 top-3 z-10" onClick={() => removeItem("quotes", item.id)}>
                    刪除
                  </button>
                )}
                <div className="quote-mark">"</div>
                <p className="quote-text">
                  <Field value={item.text} editing={editing} multiline onChange={v => updateItem("quotes", item.id, "text", v)} placeholder="台詞內容" />
                </p>
                <p className="quote-from">
                  — <Field value={item.from} editing={editing} onChange={v => updateItem("quotes", item.id, "from", v)} placeholder="角色｜作品名" />
                </p>
              </article>
            ))}

            {editing && (
              <button className="mini-btn" onClick={() => addItem("quotes")}>＋ 新增台詞</button>
            )}
          </section>

          <div className="divider"></div>

          <p className="section-title">推坑區</p>

          <section className="rec-list">
            {tab.recs.map((item, index) => (
              <article className="rec-card" key={item.id}>
                {editing && (
                  <button className="mini-btn danger-btn absolute right-3 top-3 z-10" onClick={() => removeItem("recs", item.id)}>
                    刪除
                  </button>
                )}

                <div className="rank">{String(index + 1).padStart(2, "0")}</div>

                <div className="flex gap-3">
                  {(editing || item.image) && (
                    <div className="cover-img">
                      {item.image ? <img src={item.image} alt={item.title} /> : "圖"}
                      {editing && (
                        <label className="upload-cover">
                          <input type="file" accept="image/*" className="hidden" onChange={e => handleUpload(e, url => updateItem("recs", item.id, "image", url))} />
                          上傳
                        </label>
                      )}
                    </div>
                  )}

                  <div className="flex-1">
                    <h3 className="rec-title">
                      <Field value={item.title} editing={editing} onChange={v => updateItem("recs", item.id, "title", v)} placeholder="作品名稱" />
                    </h3>
                    <Tags tags={item.tags} editing={editing} onChange={v => updateItem("recs", item.id, "tags", v)} />
                    <p className="desc">
                      <Field value={item.desc} editing={editing} multiline onChange={v => updateItem("recs", item.id, "desc", v)} placeholder="推薦原因" />
                    </p>
                  </div>
                </div>
              </article>
            ))}

            {editing && (
              <button className="mini-btn justify-center py-3 rounded-[14px]" onClick={() => addItem("recs")}>
                ＋ 新增推坑作品
              </button>
            )}
          </section>

          <div className="floating">
            {editing && (
              <button className="float-btn save-btn" onClick={saveData} disabled={saving} title="儲存">
                {saving ? "…" : "✓"}
              </button>
            )}
            <button className="float-btn" onClick={() => setEditing(!editing)} title="編輯">
              {editing ? "×" : "✎"}
            </button>
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
